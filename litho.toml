# 项目设置
project_path = "."
output_path = "./docs"
internal_path = "./.litho"  # 这是必需字段！
 
# 目标语言：zh, en, ja, ko, de, fr, ru, vi
target_language = "zh"
 
# 分析配置
analyze_dependencies = true
identify_components = true
max_depth = 10
core_component_percentage = 20.0
max_file_size = 65536  # 64KB
include_tests = false
include_hidden = false
 
 
excluded_dirs = [
    ".litho",
    "litho.docs",
    "target",
    "node_modules",
    ".git",
    ".venv",
    "tmp",
    "results",
    "classify",
]
 
excluded_files = [
    "litho.toml",
    "*.log",
    "*.tmp"
]
 
excluded_extensions = [
    "jpg",
    "png",
    "gif",
    "pdf",
    "zip"
]


# 包含的扩展名（留空表示包含所有）
included_extensions = []
 
 
# LLM 配置
[llm]
provider = "openai"  # 选项：openai, moonshot, deepseek, mistral, openrouter, anthropic, gemini, ollama
api_base_url = "http://localhost:12345/v1"
api_key = "dsdgsdf"
model_efficient = "qwen/qwen3.5-35b-a3b"
model_powerful = "qwen/qwen3.5-35b-a3b"
max_tokens = 102400
temperature = 0.1
retry_attempts = 5
retry_delay_ms = 5000
timeout_seconds = 300
disable_preset_tools = false
max_parallels = 3
 
# 缓存配置
[cache]
enabled = true
cache_dir = ".litho/cache"
expire_hours = 8760